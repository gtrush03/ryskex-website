    <script>
      // Dark-first. Apply saved theme class before paint to avoid flash.
      (function () {
        try {
          var saved = localStorage.getItem("ryskex-theme");
          if (saved === "light") document.documentElement.classList.add("light");
          document.documentElement.style.colorScheme = saved === "light" ? "light" : "dark";
        } catch (e) {}
      })();
    </script>
